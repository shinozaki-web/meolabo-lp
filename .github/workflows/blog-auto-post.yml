name: Blog Auto Post

on:
  schedule:
    # Mondays at 10:00 JST (01:00 UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.js

      - name: Commit and push
        run: |
          git config user.name "MEOポスト Bot"
          git config user.email "bot@meolabo.com"
          git add blog/ blog/posts.json
          git diff --staged --quiet || git commit -m "blog: add new post [skip ci]"
          git push
